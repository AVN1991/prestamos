<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Pagos"/>
  <meta name="theme-color" content="#07070f"/>
  <title>Control de Pagos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#07070f;color:#e4e2f4;font-family:'DM Sans',sans-serif;overscroll-behavior:none}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#1e1e30;border-radius:4px}
    #app{min-height:100vh;background:#07070f;padding-bottom:80px;padding-bottom:calc(80px + env(safe-area-inset-bottom))}

    /* Cards & Buttons */
    .card{background:#0f0f1b;border:1px solid #1a1a2c;border-radius:15px}
    .btn-g{background:#14c058;color:#000;border:none;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;padding:9px 16px;white-space:nowrap}
    .btn-x{background:transparent;color:#444;border:1px solid #1a1a2c;border-radius:11px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;padding:8px 14px}
    .btn-x:active{background:#111120;color:#aaa}
    .btn-g:active{background:#10a84d}

    /* Input */
    .inp{background:#07070f;border:1px solid #1a1a2c;border-radius:10px;padding:10px 14px;color:#e4e2f4;font-family:inherit;font-size:16px;width:100%;outline:none;transition:border .15s;-webkit-appearance:none}
    .inp:focus{border-color:#14c058}
    select.inp{-webkit-appearance:none}

    /* Payment row */
    .prow{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:12px;cursor:pointer;user-select:none}
    .prow:active{background:rgba(255,255,255,0.03)}
    .chk{width:24px;height:24px;border-radius:8px;border:2px solid #252538;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .chk.on{background:#14c058;border-color:#14c058}
    .chk-mark{display:none;color:#000;font-size:12px;font-weight:900}
    .chk.on .chk-mark{display:block}

    /* Nav buttons */
    .nb{background:#0f0f1b;border:1px solid #1a1a2c;color:#555;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0}
    .nb:active{background:#141428;color:#ddd}

    /* Tabs */
    .tab-wrap{display:flex;background:#0c0c1a;border:1px solid #141428;border-radius:13px;padding:4px}
    .tab-pill{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;border-radius:10px;transition:all .2s;user-select:none}
    .tab-pill.on{background:#14c058;color:#000}
    .tab-pill.off{color:#30304a}
    .bdg{display:inline-flex;align-items:center;justify-content:center;background:#ef4444;color:#fff;border-radius:99px;min-width:17px;height:17px;font-size:10px;font-weight:700;padding:0 4px;margin-left:4px;vertical-align:middle}

    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a16;border-top:1px solid #141428;z-index:50;display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
    .nav-item{flex:1;max-width:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 12px;cursor:pointer;gap:3px}
    .nav-item.on{color:#14c058}
    .nav-item.off{color:#282840}
    .nav-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .nav-icon{font-size:22px;line-height:1}

    /* Sticky header */
    .sticky-hdr{position:sticky;top:0;z-index:40;background:#07070f;border-bottom:1px solid #0f0f1e;padding-top:env(safe-area-inset-top)}
    .hdr-inner{max-width:480px;margin:0 auto;padding:16px 16px 0}

    /* Overlays */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.87);display:flex;align-items:flex-end;justify-content:center;z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
    .ov.show{opacity:1;pointer-events:all}
    .sheet{background:#0c0c1a;border:1px solid #1a1a2a;border-radius:22px 22px 0 0;padding:22px 20px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .sheet.show{transform:translateY(0)}
    .drag-handle{width:36px;height:4px;background:#1e1e32;border-radius:99px;margin:0 auto 20px}

    .dov{position:fixed;inset:0;background:rgba(0,0,0,.87);display:flex;align-items:center;justify-content:center;z-index:99;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
    .dov.show{opacity:1;pointer-events:all}
    .dbox{background:#120a0a;border:1px solid #3a1414;border-radius:20px;padding:24px;width:100%;max-width:290px;text-align:center;transform:scale(.92);transition:transform .25s}
    .dov.show .dbox{transform:scale(1)}

    /* History cards */
    .hcard{background:#0f0f1b;border:1px solid #171726;border-radius:14px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
    .hcard.open{border-color:#14c058}
    .hcard-detail{display:none}
    .hcard.open .hcard-detail{display:block}

    /* Progress bar */
    .pbar{height:4px;background:#101020;border-radius:99px;overflow:hidden}
    .pfill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

    /* Labels */
    .sec-lbl{font-size:9px;color:#222238;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:0 4px 8px;display:block}

    /* Content areas */
    .content{max-width:480px;margin:0 auto;padding:12px 16px 0}

    /* Edit input inline */
    .edit-row{display:flex;gap:6px;align-items:center}
    .edit-inp{background:#07070f;border:1px solid #1a1a2c;border-radius:10px;padding:5px 10px;color:#e4e2f4;font-family:inherit;font-size:13px;width:100px;outline:none;-webkit-appearance:none}
    .edit-inp:focus{border-color:#14c058}

    /* Stat cards */
    .stat-grid{display:flex;gap:8px;margin-bottom:10px}
    .stat-card{flex:1;padding:10px 11px}
    .stat-lbl{font-size:8px;color:#20203a;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px}
    .stat-val{font-size:12px;font-weight:700;line-height:1}

    /* Month nav */
    .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .month-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}

    /* Empty state */
    .empty{text-align:center;padding:50px 20px;color:#181828}
    .empty-icon{font-size:34px;margin-bottom:10px}
    .empty-text{font-size:13px}

    /* Animations */
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .2s ease}

    /* Row action buttons */
    .row-actions{display:flex;gap:1px}
    .action-btn{background:transparent;border:none;cursor:pointer;font-size:12px;opacity:.28;padding:4px 3px}
  </style>
</head>
<body>
<div id="app"></div>

<script>
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const DEFAULT_PAYMENTS = [
  {id:1,  name:"Comida",               amount:120000, icon:"🍽️", category:"primera"},
  {id:2,  name:"Teléfonos",            amount:50000,  icon:"📱", category:"primera"},
  {id:3,  name:"Gasolina",             amount:52000,  icon:"⛽", category:"primera"},
  {id:4,  name:"Salida primera semana",amount:33000,  icon:"🎉", category:"primera"},
  {id:5,  name:"Salida segunda semana",amount:33000,  icon:"🎉", category:"primera"},
  {id:6,  name:"Promerica",            amount:60000,  icon:"🏦", category:"primera"},
  {id:7,  name:"Bp1",                  amount:20000,  icon:"💳", category:"primera"},
  {id:8,  name:"Bp2",                  amount:20000,  icon:"💳", category:"primera"},
  {id:9,  name:"Comida",               amount:120000, icon:"🍽️", category:"segunda"},
  {id:10, name:"Internet",             amount:27000,  icon:"📡", category:"segunda"},
  {id:11, name:"Gasolina",             amount:52000,  icon:"⛽", category:"segunda"},
  {id:12, name:"Agua",                 amount:6000,   icon:"💧", category:"segunda"},
  {id:13, name:"Banco",                amount:300000, icon:"🏦", category:"segunda"},
  {id:14, name:"Corriente",            amount:37000,  icon:"⚡", category:"segunda"},
  {id:15, name:"Primera se.",          amount:90000,  icon:"💰", category:"segunda"},
  {id:16, name:"Segunda se.",          amount:90000,  icon:"💰", category:"segunda"},
  {id:17, name:"Davivienda",           amount:190000, icon:"🏦", category:"segunda"},
  {id:18, name:"Bac",                  amount:40000,  icon:"💳", category:"segunda"},
  {id:19, name:"Canapé",             amount:43000,  icon:"🛋️", category:"segunda"},
  {id:20, name:"Casa",                 amount:100000, icon:"🏠", category:"segunda"},
];

// ── Storage helpers ──────────────────────────────────────────────
function load(key, def) {
  try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; }
  catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ── App State ────────────────────────────────────────────────────
const now = new Date();
let state = {
  month:    now.getMonth(),
  year:     now.getFullYear(),
  payments: load("cp6_items", DEFAULT_PAYMENTS),
  paid:     load("cp6_paid",  {}),
  history:  load("cp6_hist",  {}),
  view:     "pagos",
  tab:      "primera",
  editId:   null,
  editAmt:  "",
  deleteId: null,
  histOpen: null,
  showAdd:  false,
};

function setState(patch) {
  Object.assign(state, typeof patch === "function" ? patch(state) : patch);
  // Persist
  save("cp6_items", state.payments);
  save("cp6_paid",  state.paid);
  save("cp6_hist",  state.history);
  render();
}

// ── Formatters ───────────────────────────────────────────────────
const fmt = n => n ? "₡" + Number(n).toLocaleString("es-CR") : "—";

// ── Computed values ──────────────────────────────────────────────
function computed() {
  const {month, year, payments, paid, tab} = state;
  const mk = `${year}-${month}`;
  const paidSet = paid[mk] || {};
  const q1 = payments.filter(p => p.category === "primera");
  const q2 = payments.filter(p => p.category === "segunda");
  const shown = tab === "primera" ? q1 : q2;
  const totalQ1 = q1.reduce((a,p)=>a+(p.amount||0),0);
  const totalQ2 = q2.reduce((a,p)=>a+(p.amount||0),0);
  const paidQ1  = q1.filter(p=>paidSet[p.id]).reduce((a,p)=>a+(p.amount||0),0);
  const paidQ2  = q2.filter(p=>paidSet[p.id]).reduce((a,p)=>a+(p.amount||0),0);
  const totalAll = totalQ1+totalQ2;
  const paidAll  = paidQ1+paidQ2;
  const pendingAll = totalAll - paidAll;
  const paidCount = payments.filter(p=>paidSet[p.id]).length;
  const progress = totalAll>0 ? (paidAll/totalAll)*100 : (paidCount/payments.length)*100||0;
  const pendQ1 = q1.filter(p=>!paidSet[p.id]).length;
  const pendQ2 = q2.filter(p=>!paidSet[p.id]).length;
  return {mk, paidSet, q1, q2, shown, totalQ1, totalQ2, paidQ1, paidQ2,
          totalAll, paidAll, pendingAll, paidCount, progress, pendQ1, pendQ2};
}

// ── Actions ──────────────────────────────────────────────────────
function saveSnapshot() {
  const {month, year, payments, paid} = state;
  const c = computed();
  const snap = {month, year, label:`${MONTHS[month]} ${year}`,
    total:c.totalAll, paid:c.paidAll, pending:c.pendingAll,
    count:payments.length, paidCount:c.paidCount,
    items: payments.map(p=>({...p, paid:!!c.paidSet[p.id]}))};
  setState(s => ({history:{...s.history, [c.mk]: snap}}));
}

function prevMonth() {
  const c = computed();
  if(c.paidCount > 0) saveSnapshot();
  setState(s => {
    if(s.month===0) return {month:11, year:s.year-1};
    return {month: s.month-1};
  });
}
function nextMonth() {
  const c = computed();
  if(c.paidCount > 0) saveSnapshot();
  setState(s => {
    if(s.month===11) return {month:0, year:s.year+1};
    return {month: s.month+1};
  });
}
function togglePaid(id) {
  const {paid} = state;
  const c = computed();
  const cur = c.paidSet[id];
  setState(s => ({paid:{...s.paid, [c.mk]:{...s.paid[c.mk], [id]:!cur}}}));
}
function addPayment(name, amount, icon, category) {
  if(!name.trim()) return;
  setState(s => ({payments:[...s.payments, {id:Date.now(), name, amount:parseFloat(amount)||0, icon, category}], showAdd:false}));
}
function delPayment(id) {
  setState(s => ({payments:s.payments.filter(p=>p.id!==id), deleteId:null}));
}
function saveEditAmt(id, amt) {
  setState(s => ({payments:s.payments.map(p=>p.id===id?{...p,amount:parseFloat(amt)||0}:p), editId:null}));
}

// ── HTML Builders ─────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})) {
    if(k==="class") el.className=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for(const c of children.flat()) {
    if(c==null||c===false) continue;
    el.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  }
  return el;
}

function badge(n) {
  if(!n) return null;
  return h("span",{class:"bdg"},String(n));
}

function statCard(label, val, color) {
  return h("div",{class:"card stat-card"},
    h("div",{class:"stat-lbl"},label),
    h("div",{class:"stat-val",style:`color:${color}`},val)
  );
}

function paymentRow(p, isPaid, c) {
  const isEditing = state.editId === p.id;

  const chk = h("div",{class:`chk${isPaid?" on":""}`,onclick:(e)=>{e.stopPropagation();if(!isEditing)togglePaid(p.id)}},
    h("span",{class:"chk-mark"},"✓")
  );
  const icon = h("div",{style:"font-size:19px;flex-shrink:0"},p.icon);
  const nameEl = h("div",{style:"flex:1;min-width:0"},
    h("div",{style:`font-weight:600;font-size:14px;text-decoration:${isPaid?"line-through":"none"};color:${isPaid?"#2a2a44":"#dddaf5"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis`},p.name)
  );

  let rightEl;
  if(isEditing) {
    const inp = h("input",{class:"edit-inp",type:"number",value:state.editAmt,placeholder:"0"});
    inp.addEventListener("input", e => { state.editAmt = e.target.value; });
    inp.addEventListener("keydown", e => {
      if(e.key==="Enter") saveEditAmt(p.id, state.editAmt);
      if(e.key==="Escape") setState({editId:null});
    });
    setTimeout(()=>inp.focus(),50);
    rightEl = h("div",{class:"edit-row",onclick:e=>e.stopPropagation()},
      inp,
      h("button",{class:"btn-g",style:"padding:5px 9px;font-size:12px",onclick:()=>saveEditAmt(p.id,state.editAmt)},"✓")
    );
  } else {
    const amtEl = h("div",{style:`font-weight:700;font-size:12px;color:${isPaid?"#2a2a44":"#dddaf5"};min-width:74px;text-align:right`},
      p.amount>0 ? "₡"+Number(p.amount).toLocaleString("es-CR") : h("span",{style:"color:#181828;font-weight:400"},"—")
    );
    const acts = h("div",{class:"row-actions",onclick:e=>e.stopPropagation()},
      h("button",{class:"action-btn",onclick:()=>setState({editId:p.id,editAmt:p.amount||""})},"✏️"),
      h("button",{class:"action-btn",onclick:()=>setState({deleteId:p.id})},"🗑️")
    );
    rightEl = h("div",{style:"display:flex;align-items:center;gap:5px"},amtEl,acts);
  }

  const row = h("div",{class:"prow",onclick:()=>{if(!isEditing)togglePaid(p.id)}},chk,icon,nameEl,rightEl);
  const wrap = h("div",{class:"card fade-up",style:`opacity:${isPaid?0.52:1};transition:opacity .2s`},row);
  return wrap;
}

function historyCard(snap) {
  const key = `${snap.year}-${snap.month}`;
  const isOpen = state.histOpen === key;
  const pct = snap.total>0 ? Math.round((snap.paid/snap.total)*100) : 0;
  const pctColor = pct===100?"#14c058":pct>50?"#facc15":"#f87171";
  const barColor = pct===100?"linear-gradient(90deg,#14c058,#5ef09a)":pct>50?"linear-gradient(90deg,#facc15,#fde68a)":"linear-gradient(90deg,#ef4444,#fca5a5)";

  const header = h("div",{style:"padding:14px 16px"},
    h("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"},
      h("div",{},
        h("div",{style:"font-family:'Syne',sans-serif;font-size:15px;font-weight:700"},snap.label),
        h("div",{style:"font-size:10px;color:#20203a;margin-top:1px"},`${snap.paidCount} de ${snap.count} pagos`)
      ),
      h("div",{style:"text-align:right"},
        h("div",{style:`font-size:13px;font-weight:700;color:${pctColor}`},`${pct}%`),
        h("div",{style:"font-size:10px;color:#20203a"},`${fmt(snap.paid)} / ${fmt(snap.total)}`)
      )
    ),
    h("div",{class:"pbar"},h("div",{class:"pfill",style:`width:${pct}%;background:${barColor}`}))
  );

  let detail = null;
  if(isOpen) {
    const rows = ["primera","segunda"].map(cat => {
      const items = snap.items.filter(i=>i.category===cat);
      return h("div",{style:cat==="primera"?"margin-bottom:14px":""},
        h("span",{class:"sec-lbl",style:"padding-bottom:6px"},cat==="primera"?"1ª Quincena":"2ª Quincena"),
        ...items.map(i =>
          h("div",{style:"display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #0e0e1c"},
            h("div",{style:`width:15px;height:15px;border-radius:5px;background:${i.paid?"#14c058":"#141428"};display:flex;align-items:center;justify-content:center;flex-shrink:0`},
              i.paid?h("span",{style:"color:#000;font-size:9px;font-weight:900"},"✓"):null
            ),
            h("span",{style:"font-size:13px"},i.icon),
            h("span",{style:`flex:1;font-size:12px;color:${i.paid?"#444460":"#8a88a8"};text-decoration:${i.paid?"line-through":"none"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis`},i.name),
            h("span",{style:`font-size:11px;font-weight:600;color:${i.paid?"#14c058":"#282840"}`},
              i.amount>0?"₡"+Number(i.amount).toLocaleString("es-CR"):"—"
            )
          )
        )
      );
    });

    detail = h("div",{style:"border-top:1px solid #111120;padding:12px 16px 14px"},
      ...rows,
      h("div",{style:"margin-top:12px;display:flex;justify-content:flex-end;gap:16px;font-size:11px"},
        h("span",{style:"color:#20203a"},"Pagado: ",h("strong",{style:"color:#14c058"},fmt(snap.paid))),
        h("span",{style:"color:#20203a"},"Pendiente: ",h("strong",{style:`color:${snap.pending>0?"#f87171":"#14c058"}`},fmt(snap.pending)))
      )
    );
  }

  const card = h("div",{class:`hcard${isOpen?" open":""}`,onclick:()=>setState({histOpen:isOpen?null:key})},
    header, detail||""
  );
  return card;
}

// ── Add Modal ────────────────────────────────────────────────────
function buildAddModal() {
  let _name="", _amt="", _icon="💳", _cat="primera";

  const iconInp = h("input",{class:"inp",placeholder:"😀",maxlength:"2",style:"width:54px;text-align:center;font-size:20px"});
  iconInp.value = _icon;
  iconInp.addEventListener("input",e=>_icon=e.target.value||"💳");

  const nameInp = h("input",{class:"inp",placeholder:"Nombre del pago"});
  nameInp.addEventListener("input",e=>_name=e.target.value);
  nameInp.addEventListener("keydown",e=>{ if(e.key==="Enter") doAdd(); });

  const amtInp = h("input",{class:"inp",type:"number",placeholder:"Monto en ₡ colones (ej: 50000)"});
  amtInp.addEventListener("input",e=>_amt=e.target.value);

  const catSel = h("select",{class:"inp"},
    h("option",{value:"primera"},"1ª Quincena"),
    h("option",{value:"segunda"},"2ª Quincena")
  );
  catSel.addEventListener("change",e=>_cat=e.target.value);

  function doAdd() { addPayment(_name,_amt,_icon,_cat); }

  const sheet = h("div",{class:`sheet${state.showAdd?" show":""}`,onclick:e=>e.stopPropagation()},
    h("div",{class:"drag-handle"}),
    h("div",{style:"font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:16px"},"Nuevo pago"),
    h("div",{style:"display:flex;flex-direction:column;gap:10px"},
      h("div",{style:"display:flex;gap:8px"},iconInp,nameInp),
      amtInp, catSel,
      h("div",{style:"display:flex;gap:8px;margin-top:4px"},
        h("button",{class:"btn-x",style:"flex:1",onclick:()=>setState({showAdd:false})},"Cancelar"),
        h("button",{class:"btn-g",style:"flex:2",onclick:doAdd},"Agregar pago")
      )
    )
  );

  setTimeout(()=>{
    sheet.classList.toggle("show",state.showAdd);
    if(state.showAdd) setTimeout(()=>nameInp.focus(),350);
  },10);

  const ov = h("div",{class:`ov${state.showAdd?" show":""}`,onclick:()=>setState({showAdd:false})},sheet);
  return ov;
}

// ── Delete Modal ─────────────────────────────────────────────────
function buildDeleteModal() {
  const dbox = h("div",{class:"dbox",onclick:e=>e.stopPropagation()},
    h("div",{style:"font-size:28px;margin-bottom:10px"},"🗑️"),
    h("div",{style:"font-weight:700;margin-bottom:6px"},"¿Eliminar pago?"),
    h("div",{style:"font-size:12px;color:#444;margin-bottom:16px"},"Se borrará de todos los meses"),
    h("div",{style:"display:flex;gap:8px"},
      h("button",{class:"btn-x",style:"flex:1",onclick:()=>setState({deleteId:null})},"No"),
      h("button",{class:"btn-g",style:"flex:1;background:#dc2626;color:#fff",onclick:()=>delPayment(state.deleteId)},"Sí")
    )
  );
  return h("div",{class:`dov${state.deleteId?" show":""}`,onclick:()=>setState({deleteId:null})},dbox);
}

// ── Main Render ──────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  const {view, tab, month, year, payments, history} = state;
  const c = computed();

  // ── HEADER ──
  let headerContent;

  if(view==="pagos") {
    const progress = Math.min(c.progress,100);
    const pendCol = c.pendingAll>0?"#f87171":"#14c058";

    headerContent = h("div",{},
      // Title row
      h("div",{style:"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px"},
        h("div",{},
          h("div",{style:"font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.025em;line-height:1.1"},"Control de Pagos"),
          h("div",{style:"font-size:11px;color:#20203a;margin-top:2px"},"Registro mensual · Colones ₡")
        ),
        h("button",{class:"btn-g",style:"font-size:12px",onclick:()=>setState({showAdd:true})},"+ Nuevo")
      ),
      // Month nav
      h("div",{class:"month-nav"},
        h("button",{class:"nb",onclick:prevMonth},"‹"),
        h("div",{class:"month-name"},`${MONTHS[month]} ${year}`),
        h("button",{class:"nb",onclick:nextMonth},"›")
      ),
      // Stats
      h("div",{class:"stat-grid"},
        statCard("Total mes", fmt(c.totalAll), "#c4c1e8"),
        statCard("Pagado",    fmt(c.paidAll),  "#14c058"),
        statCard("Pendiente", fmt(c.pendingAll), pendCol)
      ),
      // Progress
      h("div",{style:"margin-bottom:12px"},
        h("div",{style:"display:flex;justify-content:space-between;margin-bottom:5px"},
          h("span",{style:"font-size:10px;color:#20203a"},`${c.paidCount} de ${payments.length} pagos`),
          h("span",{style:"font-size:10px;color:#14c058;font-weight:700"},`${Math.round(progress)}%`)
        ),
        h("div",{class:"pbar"},
          h("div",{class:"pfill",style:`width:${progress}%;background:linear-gradient(90deg,#14c058,#5ef09a)`})
        )
      ),
      // Quincena tabs
      h("div",{class:"tab-wrap",style:"padding-bottom:18px"},
        h("div",{class:`tab-pill${tab==="primera"?" on":" off"}`,onclick:()=>setState({tab:"primera"})},
          "1ª Quincena", badge(c.pendQ1)
        ),
        h("div",{class:`tab-pill${tab==="segunda"?" on":" off"}`,onclick:()=>setState({tab:"segunda"})},
          "2ª Quincena", badge(c.pendQ2)
        )
      )
    );
  } else {
    headerContent = h("div",{style:"padding-bottom:16px"},
      h("div",{style:"font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.025em;margin-bottom:3px"},"Histórico"),
      h("div",{style:"font-size:11px;color:#20203a"},"Registro de meses guardados")
    );
  }

  const header = h("div",{class:"sticky-hdr"},
    h("div",{class:"hdr-inner"},headerContent)
  );

  // ── PAGOS CONTENT ──
  let mainContent;

  if(view==="pagos") {
    const shownPend = c.shown.filter(p=>!c.paidSet[p.id]);
    const shownPaid = c.shown.filter(p=> c.paidSet[p.id]);
    const qTotal = tab==="primera"?c.totalQ1:c.totalQ2;
    const qPaid  = tab==="primera"?c.paidQ1:c.paidQ2;

    const parts = [];

    parts.push(
      h("div",{style:"display:flex;justify-content:space-between;align-items:center;padding:4px 4px 8px"},
        h("span",{class:"sec-lbl",style:"padding-bottom:0"},tab==="primera"?"Primera quincena":"Segunda quincena"),
        h("span",{style:"font-size:10px;color:#20203a"},`${fmt(qPaid)} / ${fmt(qTotal)}`)
      )
    );

    if(shownPend.length>0) {
      parts.push(
        h("div",{style:"margin-bottom:12px"},
          h("div",{style:"font-size:9px;color:#f87171;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:0 4px 7px"},"⏳ Pendientes"),
          h("div",{style:"display:flex;flex-direction:column;gap:5px"},
            ...shownPend.map(p=>paymentRow(p,false,c))
          )
        )
      );
    }

    if(shownPaid.length>0) {
      parts.push(
        h("div",{},
          h("div",{style:"font-size:9px;color:#14c058;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:0 4px 7px"},"✓ Pagados"),
          h("div",{style:"display:flex;flex-direction:column;gap:5px"},
            ...shownPaid.map(p=>paymentRow(p,true,c))
          )
        )
      );
    }

    if(c.shown.length===0) {
      parts.push(h("div",{class:"empty"},
        h("div",{class:"empty-icon"},"📋"),
        h("div",{class:"empty-text"},"Sin pagos en esta quincena")
      ));
    }

    if(c.paidCount>0) {
      parts.push(h("div",{style:"text-align:center;margin-top:22px"},
        h("button",{class:"btn-x",style:"font-size:11px",onclick:saveSnapshot},"💾 Guardar en histórico")
      ));
    }

    mainContent = h("div",{class:"content"},...parts);

  } else {
    // ── HISTÓRICO ──
    const entries = Object.values(history).sort((a,b)=>(b.year*12+b.month)-(a.year*12+a.month));
    if(entries.length===0) {
      mainContent = h("div",{class:"content"},
        h("div",{class:"empty"},
          h("div",{class:"empty-icon"},"🗂️"),
          h("div",{style:"font-size:14px;margin-bottom:6px;color:#2a2a44"},"Sin histórico todavía"),
          h("div",{style:"font-size:12px;color:#141428;line-height:1.5"},"Al navegar entre meses con pagos marcados, se guarda automáticamente")
        )
      );
    } else {
      mainContent = h("div",{class:"content"},...entries.map(historyCard));
    }
  }

  // ── BOTTOM NAV ──
  const bottomNav = h("div",{class:"bottom-nav"},
    h("div",{style:"display:flex;width:100%;max-width:480px"},
      h("div",{class:`nav-item${view==="pagos"?" on":" off"}`,onclick:()=>setState({view:"pagos"})},
        h("span",{class:"nav-icon"},"💸"),
        h("span",{class:"nav-lbl"},"Pagos")
      ),
      h("div",{class:`nav-item${view==="historico"?" on":" off"}`,onclick:()=>setState({view:"historico"})},
        h("span",{class:"nav-icon"},"🗂️"),
        h("span",{class:"nav-lbl"},"Histórico")
      )
    )
  );

  // ── MODALS ──
  const addModal = buildAddModal();
  const delModal = buildDeleteModal();

  // ── ASSEMBLE ──
  app.innerHTML = "";
  app.appendChild(header);
  app.appendChild(mainContent);
  app.appendChild(bottomNav);
  app.appendChild(addModal);
  app.appendChild(delModal);
}

// Initial render
render();
</script>
</body>
</html>
